AWSTemplateFormatVersion: '2010-09-09'
Description: 'Workshop infrastructure - S3 bucket and Cognito OAuth resources for AgentCore'

Parameters:
  BucketName:
    Type: String
    Description: 'Name for the S3 bucket (leave empty for auto-generated)'
    Default: ''

Resources:

  # -----------------------------------------------------------------------
  # S3 Bucket
  # -----------------------------------------------------------------------

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionToIA
            Status: Enabled
            Transition:
              StorageClass: STANDARD_IA
              TransitionInDays: 30
          - Id: TransitionToGlacier
            Status: Enabled
            Transition:
              StorageClass: GLACIER
              TransitionInDays: 90
      Tags:
        - Key: Name
          Value: RIV2025_DVT404

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: '*'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:DeleteObject'
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
            Resource:
              - !Sub '${S3Bucket.Arn}/*'
              - !GetAtt S3Bucket.Arn
            Condition:
              Bool:
                'aws:SecureTransport': 'false'
          - Sid: AllowCurrentAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:DeleteObject'
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
              - 's3:GetBucketVersioning'
              - 's3:PutBucketVersioning'
            Resource:
              - !Sub '${S3Bucket.Arn}/*'
              - !GetAtt S3Bucket.Arn

  # -----------------------------------------------------------------------
  # Cognito: Flights MCP Server
  # -----------------------------------------------------------------------

  FlightsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: flights-mcp-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  FlightsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'flights-mcp-${AWS::AccountId}'
      UserPoolId: !Ref FlightsUserPool

  FlightsResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref FlightsUserPool
      Identifier: flights-mcp
      Name: Flights MCP Server
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Flights MCP Server

  FlightsAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: FlightsResourceServer
    Properties:
      UserPoolId: !Ref FlightsUserPool
      ClientName: flights-mcp-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - flights-mcp/access
      AllowedOAuthFlowsUserPoolClient: true

  # -----------------------------------------------------------------------
  # Cognito: Hotels MCP Server
  # -----------------------------------------------------------------------

  HotelsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: hotels-mcp-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  HotelsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'hotels-mcp-${AWS::AccountId}'
      UserPoolId: !Ref HotelsUserPool

  HotelsResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref HotelsUserPool
      Identifier: hotels-mcp
      Name: Hotels MCP Server
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Hotels MCP Server

  HotelsAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: HotelsResourceServer
    Properties:
      UserPoolId: !Ref HotelsUserPool
      ClientName: hotels-mcp-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - hotels-mcp/access
      AllowedOAuthFlowsUserPoolClient: true

  # -----------------------------------------------------------------------
  # Cognito: Travel Agent
  # -----------------------------------------------------------------------

  TravelAgentUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: travel-agent-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  TravelAgentUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'travel-agent-${AWS::AccountId}'
      UserPoolId: !Ref TravelAgentUserPool

  TravelAgentResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref TravelAgentUserPool
      Identifier: travel-agent
      Name: Travel Agent
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Travel Agent

  TravelAgentAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: TravelAgentResourceServer
    Properties:
      UserPoolId: !Ref TravelAgentUserPool
      ClientName: travel-agent-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - travel-agent/access
      AllowedOAuthFlowsUserPoolClient: true

# -----------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  # Flights MCP
  FlightsUserPoolId:
    Description: 'Cognito User Pool ID for Flights MCP'
    Value: !Ref FlightsUserPool

  FlightsDiscoveryUrl:
    Description: 'OIDC Discovery URL for Flights MCP'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${FlightsUserPool}/.well-known/openid-configuration'

  FlightsClientId:
    Description: 'App Client ID for Flights MCP'
    Value: !Ref FlightsAppClient

  FlightsTokenEndpoint:
    Description: 'Token endpoint for Flights MCP'
    Value: !Sub 'https://flights-mcp-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'

  FlightsScope:
    Description: 'OAuth scope for Flights MCP'
    Value: 'flights-mcp/access'

  # Hotels MCP
  HotelsUserPoolId:
    Description: 'Cognito User Pool ID for Hotels MCP'
    Value: !Ref HotelsUserPool

  HotelsDiscoveryUrl:
    Description: 'OIDC Discovery URL for Hotels MCP'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${HotelsUserPool}/.well-known/openid-configuration'

  HotelsClientId:
    Description: 'App Client ID for Hotels MCP'
    Value: !Ref HotelsAppClient

  HotelsTokenEndpoint:
    Description: 'Token endpoint for Hotels MCP'
    Value: !Sub 'https://hotels-mcp-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'

  HotelsScope:
    Description: 'OAuth scope for Hotels MCP'
    Value: 'hotels-mcp/access'

  # Travel Agent
  TravelAgentUserPoolId:
    Description: 'Cognito User Pool ID for Travel Agent'
    Value: !Ref TravelAgentUserPool

  TravelAgentDiscoveryUrl:
    Description: 'OIDC Discovery URL for Travel Agent'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${TravelAgentUserPool}/.well-known/openid-configuration'

  TravelAgentClientId:
    Description: 'App Client ID for Travel Agent'
    Value: !Ref TravelAgentAppClient

  TravelAgentTokenEndpoint:
    Description: 'Token endpoint for Travel Agent'
    Value: !Sub 'https://travel-agent-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'

  TravelAgentScope:
    Description: 'OAuth scope for Travel Agent'
    Value: 'travel-agent/access'
