AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Student Services Infrastructure - Provisions S3 buckets, Bedrock Knowledge Base
  with S3 Vectors storage, DynamoDB tables, and SSM Parameters for the Student
  Services multi-agent application.

Resources:
  # ============================================================================
  # S3 Buckets
  # ============================================================================

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub student-services-data-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  VectorsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub student-services-vectors-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================================
  # IAM Role for Bedrock Knowledge Base
  # ============================================================================

  BedrockKBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub student-services-kb-role-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: BedrockKBDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3DataBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub ${DataBucket.Arn}/*
              - Sid: S3VectorsBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt VectorsBucket.Arn
                  - !Sub ${VectorsBucket.Arn}/*
              - Sid: BedrockInvokeModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0

  # ============================================================================
  # Bedrock Knowledge Base (S3 Vectors)
  # ============================================================================

  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn:
      - BedrockKBRole
      - VectorsBucket
    Properties:
      Name: student-services-kb
      Description: Knowledge base for Student Services course catalog
      RoleArn: !GetAtt BedrockKBRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          VectorBucketArn: !GetAtt VectorsBucket.Arn

  DataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      Name: student-services-s3-datasource
      Description: S3 data source for course catalog PDF
      KnowledgeBaseId: !GetAtt KnowledgeBase.KnowledgeBaseId
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt DataBucket.Arn
          InclusionPrefixes:
            - kb-datasource/

  # ============================================================================
  # DynamoDB Tables
  # ============================================================================

  CourseRegistrationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: course_registration
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: reg_id
          AttributeType: S
      KeySchema:
        - AttributeName: reg_id
          KeyType: HASH

  CourseReviewsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: course_reviews
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: course_name
          AttributeType: S
      KeySchema:
        - AttributeName: course_name
          KeyType: HASH

  # ============================================================================
  # SSM Parameters
  # ============================================================================

  SSMDataBucketName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/data-bucket-name
      Type: String
      Value: !Ref DataBucket
      Description: S3 data bucket name for student services

  SSMVectorsBucketName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/vectors-bucket-name
      Type: String
      Value: !Ref VectorsBucket
      Description: S3 vectors bucket name for student services

  SSMKnowledgeBaseId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/knowledge-base-id
      Type: String
      Value: !GetAtt KnowledgeBase.KnowledgeBaseId
      Description: Bedrock Knowledge Base ID

  SSMDataSourceId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/data-source-id
      Type: String
      Value: !GetAtt DataSource.DataSourceId
      Description: Bedrock Knowledge Base data source ID

  SSMCourseRegistrationTable:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/course-registration-table
      Type: String
      Value: !Ref CourseRegistrationTable
      Description: DynamoDB course registration table name

  SSMCourseReviewsTable:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/course-reviews-table
      Type: String
      Value: !Ref CourseReviewsTable
      Description: DynamoDB course reviews table name

  SSMAwsRegion:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/aws-region
      Type: String
      Value: !Ref AWS::Region
      Description: AWS region for student services

  SSMModelProvider:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/model-provider
      Type: String
      Value: bedrock
      Description: Model provider (bedrock or sagemaker)

  SSMModelId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/model-id
      Type: String
      Value: us.amazon.nova-2-lite-v1:0
      Description: Default model ID for agent inference

  SSMTemperature:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /student-services/temperature
      Type: String
      Value: '0.3'
      Description: Default temperature for model inference

# ============================================================================
# Stack Outputs
# ============================================================================

Outputs:
  DataBucketName:
    Description: S3 data bucket name
    Value: !Ref DataBucket
    Export:
      Name: !Sub ${AWS::StackName}-DataBucketName

  VectorsBucketName:
    Description: S3 vectors bucket name
    Value: !Ref VectorsBucket
    Export:
      Name: !Sub ${AWS::StackName}-VectorsBucketName

  CourseRegistrationTableName:
    Description: DynamoDB course registration table name
    Value: !Ref CourseRegistrationTable
    Export:
      Name: !Sub ${AWS::StackName}-CourseRegistrationTable

  CourseReviewsTableName:
    Description: DynamoDB course reviews table name
    Value: !Ref CourseReviewsTable
    Export:
      Name: !Sub ${AWS::StackName}-CourseReviewsTable

  KnowledgeBaseId:
    Description: Bedrock Knowledge Base ID
    Value: !GetAtt KnowledgeBase.KnowledgeBaseId
    Export:
      Name: !Sub ${AWS::StackName}-KnowledgeBaseId

  DataSourceId:
    Description: Bedrock Knowledge Base data source ID
    Value: !GetAtt DataSource.DataSourceId
    Export:
      Name: !Sub ${AWS::StackName}-DataSourceId
