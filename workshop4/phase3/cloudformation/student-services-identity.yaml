# -----------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------

Outputs:

  # Orchestrator
  OrchestratorUserPoolId:
    Description: 'Cognito User Pool ID for Orchestrator'
    Value: !Ref OrchestratorUserPool
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorUserPoolId'

  OrchestratorDiscoveryUrl:
    Description: 'OIDC Discovery URL for Orchestrator'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${OrchestratorUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorDiscoveryUrl'

  OrchestratorClientId:
    Description: 'App Client ID for Orchestrator'
    Value: !Ref OrchestratorAppClient
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorClientId'

  OrchestratorTokenEndpoint:
    Description: 'Token endpoint for Orchestrator'
    Value: !Sub 'https://orchestrator-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorTokenEndpoint'

  OrchestratorScope:
    Description: 'OAuth scope for Orchestrator'
    Value: 'orchestrator/access'
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorScope'

