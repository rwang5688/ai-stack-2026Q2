AWSTemplateFormatVersion: '2010-09-09'
Description: 'Student Services Identity - 5 Cognito User Pools for AgentCore Microservices (Phase 3)'

Resources:

  # -----------------------------------------------------------------------
  # Cognito: Orchestrator
  # -----------------------------------------------------------------------

  OrchestratorUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: orchestrator-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  OrchestratorUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'orchestrator-${AWS::AccountId}'
      UserPoolId: !Ref OrchestratorUserPool

  OrchestratorResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref OrchestratorUserPool
      Identifier: orchestrator
      Name: Orchestrator Runtime
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Orchestrator Runtime

  OrchestratorAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: OrchestratorResourceServer
    Properties:
      UserPoolId: !Ref OrchestratorUserPool
      ClientName: orchestrator-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - orchestrator/access
      AllowedOAuthFlowsUserPoolClient: true

  # -----------------------------------------------------------------------
  # Cognito: Course Registration
  # -----------------------------------------------------------------------

  CourseRegistrationUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: course-registration-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  CourseRegistrationUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'course-registration-${AWS::AccountId}'
      UserPoolId: !Ref CourseRegistrationUserPool

  CourseRegistrationResourceServer:
