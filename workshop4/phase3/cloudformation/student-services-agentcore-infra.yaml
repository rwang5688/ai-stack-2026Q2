AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Student Services AgentCore Infrastructure - Cognito OAuth pools for runtime
  authentication and IAM execution roles for AgentCore Direct Deploy runtimes (Phase 3).
  Organized by domain: each agent's identity (Cognito) and permissions (IAM) are grouped together.

Resources:

  # =======================================================================
  # SHARED: Base IAM Policy (attached to all execution roles)
  #
  # Common permissions every AgentCore Direct Deploy runtime needs:
  #   - Bedrock model invocation (InvokeModel, InvokeModelWithResponseStream)
  #   - CloudWatch Logs (create groups, streams, put events)
  #   - CloudWatch Metrics (bedrock-agentcore namespace)
  #   - X-Ray tracing
  # =======================================================================

  AgentCoreBasePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'student-services-agentcore-base-${AWS::Region}'
      Description: Base permissions for AgentCore Direct Deploy runtimes (logs, X-Ray, CloudWatch, Bedrock)
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BedrockModelInvocation
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - 'arn:aws:bedrock:*::foundation-model/*'
              - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*'
          - Sid: CloudWatchLogsCreateGroup
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*'
          - Sid: CloudWatchLogsDescribeGroups
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'
          - Sid: CloudWatchLogsPutEvents
            Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*:log-stream:*'
          - Sid: CloudWatchMetrics
            Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
            Condition:
              StringEquals:
                cloudwatch:namespace: bedrock-agentcore
          - Sid: SSMParameterAccess
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/student-services/*'
          - Sid: XRayTracing
            Effect: Allow
            Action:
              - xray:GetSamplingRules
              - xray:GetSamplingTargets
              - xray:PutTelemetryRecords
              - xray:PutTraceSegments
            Resource: '*'

  # =======================================================================
  # DOMAIN: StudentServicesAgent (Orchestrator)
  #
  # HTTP runtime invoked via SigV4 from thin client.
  # No Cognito pool needed (inbound auth is IAM-based).
  # Permissions: Bedrock only (base policy).
  # =======================================================================

  StudentServicesAgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StudentServicesAgent-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - !Ref AgentCoreBasePolicy

  # =======================================================================
  # DOMAIN: StudentServicesGateway
  #
  # Cognito pool that protects the AgentCore Gateway inbound endpoint.
  # The orchestrator presents a token from this pool to access the gateway.
  # No execution role needed (gateway is managed infrastructure, not a runtime).
  # =======================================================================

  StudentServicesGatewayUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: student-services-gateway-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  StudentServicesGatewayUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'student-services-gateway-${AWS::AccountId}'
      UserPoolId: !Ref StudentServicesGatewayUserPool

  StudentServicesGatewayResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref StudentServicesGatewayUserPool
      Identifier: student-services-gateway
      Name: Student Services Gateway
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Student Services Gateway

  StudentServicesGatewayAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: StudentServicesGatewayResourceServer
    Properties:
      UserPoolId: !Ref StudentServicesGatewayUserPool
      ClientName: student-services-gateway-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - student-services-gateway/access
      AllowedOAuthFlowsUserPoolClient: true

  # =======================================================================
  # DOMAIN: CourseRegistration
  #
  # MCP server that registers students in courses.
  # Execution role: Bedrock (base) + DynamoDB (course_registration table writes).
  # Cognito: protects the MCP runtime endpoint (gateway authenticates outbound).
  # =======================================================================

  CourseRegistrationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CourseRegistration-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - !Ref AgentCoreBasePolicy
        - 'arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess'

  CourseRegistrationUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: course-registration-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  CourseRegistrationUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'course-registration-${AWS::AccountId}'
      UserPoolId: !Ref CourseRegistrationUserPool

  CourseRegistrationResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CourseRegistrationUserPool
      Identifier: course-registration
      Name: Course Registration
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Course Registration MCP Server

  CourseRegistrationAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CourseRegistrationResourceServer
    Properties:
      UserPoolId: !Ref CourseRegistrationUserPool
      ClientName: course-registration-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - course-registration/access
      AllowedOAuthFlowsUserPoolClient: true

  # =======================================================================
  # DOMAIN: CourseCatalog
  #
  # MCP server that searches the course catalog via Bedrock Knowledge Base.
  # Execution role: Bedrock (base) + Bedrock Agent Runtime (Knowledge Base retrieval).
  # Cognito: protects the MCP runtime endpoint.
  # =======================================================================

  CourseCatalogExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CourseCatalog-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - !Ref AgentCoreBasePolicy
      Policies:
        - PolicyName: BedrockKnowledgeBaseAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockAgentRuntimeRetrieve
                Effect: Allow
                Action:
                  - bedrock:Retrieve
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'

  CourseCatalogUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: course-catalog-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  CourseCatalogUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'course-catalog-${AWS::AccountId}'
      UserPoolId: !Ref CourseCatalogUserPool

  CourseCatalogResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CourseCatalogUserPool
      Identifier: course-catalog
      Name: Course Catalog
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Course Catalog MCP Server

  CourseCatalogAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CourseCatalogResourceServer
    Properties:
      UserPoolId: !Ref CourseCatalogUserPool
      ClientName: course-catalog-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - course-catalog/access
      AllowedOAuthFlowsUserPoolClient: true

  # =======================================================================
  # DOMAIN: CourseReviews
  #
  # MCP server that retrieves course reviews from DynamoDB.
  # Execution role: Bedrock (base) + DynamoDB (course_reviews table reads).
  # Cognito: protects the MCP runtime endpoint.
  # =======================================================================

  CourseReviewsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CourseReviews-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - !Ref AgentCoreBasePolicy
        - 'arn:aws:iam::aws:policy/AmazonDynamoDBReadOnlyAccess'

  CourseReviewsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: course-reviews-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  CourseReviewsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'course-reviews-${AWS::AccountId}'
      UserPoolId: !Ref CourseReviewsUserPool

  CourseReviewsResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CourseReviewsUserPool
      Identifier: course-reviews
      Name: Course Reviews
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Course Reviews MCP Server

  CourseReviewsAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CourseReviewsResourceServer
    Properties:
      UserPoolId: !Ref CourseReviewsUserPool
      ClientName: course-reviews-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - course-reviews/access
      AllowedOAuthFlowsUserPoolClient: true

  # =======================================================================
  # DOMAIN: LoanApplication
  #
  # MCP server that predicts loan acceptance via SageMaker XGBoost endpoint.
  # Execution role: Bedrock (base) + SageMaker Runtime (InvokeEndpoint).
  # Cognito: protects the MCP runtime endpoint.
  # =======================================================================

  LoanApplicationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LoanApplication-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - !Ref AgentCoreBasePolicy
      Policies:
        - PolicyName: SageMakerInvokeEndpoint
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SageMakerRuntimeInvoke
                Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource:
                  - !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*'

  LoanApplicationUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: loan-application-user-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  LoanApplicationUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'loan-application-${AWS::AccountId}'
      UserPoolId: !Ref LoanApplicationUserPool

  LoanApplicationResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref LoanApplicationUserPool
      Identifier: loan-application
      Name: Loan Application
      Scopes:
        - ScopeName: access
          ScopeDescription: Access Loan Application MCP Server

  LoanApplicationAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: LoanApplicationResourceServer
    Properties:
      UserPoolId: !Ref LoanApplicationUserPool
      ClientName: loan-application-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - loan-application/access
      AllowedOAuthFlowsUserPoolClient: true

# =======================================================================
# Outputs
# =======================================================================

Outputs:

  # --- StudentServicesAgent ---
  StudentServicesAgentExecutionRoleArn:
    Description: 'Execution role ARN for StudentServicesAgent runtime'
    Value: !GetAtt StudentServicesAgentExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesAgentExecutionRoleArn'

  # --- StudentServicesGateway ---
  StudentServicesGatewayUserPoolId:
    Description: 'Cognito User Pool ID for Student Services Gateway'
    Value: !Ref StudentServicesGatewayUserPool
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesGatewayUserPoolId'

  StudentServicesGatewayDiscoveryUrl:
    Description: 'OIDC Discovery URL for Student Services Gateway'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${StudentServicesGatewayUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesGatewayDiscoveryUrl'

  StudentServicesGatewayClientId:
    Description: 'App Client ID for Student Services Gateway'
    Value: !Ref StudentServicesGatewayAppClient
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesGatewayClientId'

  StudentServicesGatewayTokenEndpoint:
    Description: 'Token endpoint for Student Services Gateway'
    Value: !Sub 'https://student-services-gateway-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesGatewayTokenEndpoint'

  StudentServicesGatewayScope:
    Description: 'OAuth scope for Student Services Gateway'
    Value: 'student-services-gateway/access'
    Export:
      Name: !Sub '${AWS::StackName}-StudentServicesGatewayScope'

  # --- CourseRegistration ---
  CourseRegistrationExecutionRoleArn:
    Description: 'Execution role ARN for CourseRegistration runtime'
    Value: !GetAtt CourseRegistrationExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationExecutionRoleArn'

  CourseRegistrationUserPoolId:
    Description: 'Cognito User Pool ID for Course Registration'
    Value: !Ref CourseRegistrationUserPool
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationUserPoolId'

  CourseRegistrationDiscoveryUrl:
    Description: 'OIDC Discovery URL for Course Registration'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CourseRegistrationUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationDiscoveryUrl'

  CourseRegistrationClientId:
    Description: 'App Client ID for Course Registration'
    Value: !Ref CourseRegistrationAppClient
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationClientId'

  CourseRegistrationTokenEndpoint:
    Description: 'Token endpoint for Course Registration'
    Value: !Sub 'https://course-registration-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationTokenEndpoint'

  CourseRegistrationScope:
    Description: 'OAuth scope for Course Registration'
    Value: 'course-registration/access'
    Export:
      Name: !Sub '${AWS::StackName}-CourseRegistrationScope'

  # --- CourseCatalog ---
  CourseCatalogExecutionRoleArn:
    Description: 'Execution role ARN for CourseCatalog runtime'
    Value: !GetAtt CourseCatalogExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogExecutionRoleArn'

  CourseCatalogUserPoolId:
    Description: 'Cognito User Pool ID for Course Catalog'
    Value: !Ref CourseCatalogUserPool
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogUserPoolId'

  CourseCatalogDiscoveryUrl:
    Description: 'OIDC Discovery URL for Course Catalog'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CourseCatalogUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogDiscoveryUrl'

  CourseCatalogClientId:
    Description: 'App Client ID for Course Catalog'
    Value: !Ref CourseCatalogAppClient
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogClientId'

  CourseCatalogTokenEndpoint:
    Description: 'Token endpoint for Course Catalog'
    Value: !Sub 'https://course-catalog-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogTokenEndpoint'

  CourseCatalogScope:
    Description: 'OAuth scope for Course Catalog'
    Value: 'course-catalog/access'
    Export:
      Name: !Sub '${AWS::StackName}-CourseCatalogScope'

  # --- CourseReviews ---
  CourseReviewsExecutionRoleArn:
    Description: 'Execution role ARN for CourseReviews runtime'
    Value: !GetAtt CourseReviewsExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsExecutionRoleArn'

  CourseReviewsUserPoolId:
    Description: 'Cognito User Pool ID for Course Reviews'
    Value: !Ref CourseReviewsUserPool
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsUserPoolId'

  CourseReviewsDiscoveryUrl:
    Description: 'OIDC Discovery URL for Course Reviews'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CourseReviewsUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsDiscoveryUrl'

  CourseReviewsClientId:
    Description: 'App Client ID for Course Reviews'
    Value: !Ref CourseReviewsAppClient
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsClientId'

  CourseReviewsTokenEndpoint:
    Description: 'Token endpoint for Course Reviews'
    Value: !Sub 'https://course-reviews-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsTokenEndpoint'

  CourseReviewsScope:
    Description: 'OAuth scope for Course Reviews'
    Value: 'course-reviews/access'
    Export:
      Name: !Sub '${AWS::StackName}-CourseReviewsScope'

  # --- LoanApplication ---
  LoanApplicationExecutionRoleArn:
    Description: 'Execution role ARN for LoanApplication runtime'
    Value: !GetAtt LoanApplicationExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationExecutionRoleArn'

  LoanApplicationUserPoolId:
    Description: 'Cognito User Pool ID for Loan Application'
    Value: !Ref LoanApplicationUserPool
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationUserPoolId'

  LoanApplicationDiscoveryUrl:
    Description: 'OIDC Discovery URL for Loan Application'
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${LoanApplicationUserPool}/.well-known/openid-configuration'
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationDiscoveryUrl'

  LoanApplicationClientId:
    Description: 'App Client ID for Loan Application'
    Value: !Ref LoanApplicationAppClient
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationClientId'

  LoanApplicationTokenEndpoint:
    Description: 'Token endpoint for Loan Application'
    Value: !Sub 'https://loan-application-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationTokenEndpoint'

  LoanApplicationScope:
    Description: 'OAuth scope for Loan Application'
    Value: 'loan-application/access'
    Export:
      Name: !Sub '${AWS::StackName}-LoanApplicationScope'
